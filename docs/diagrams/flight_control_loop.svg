 x="330" y="513.0" font-size="9" fill="#3A3A3A" text-anchor="middle">smooth, drifts</text><polyline points="330,524 330,548" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="200.0" y="548" width="260" height="44" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="564.0" font-size="11" fill="#000000" text-anchor="middle">Complementary blend</text><text x="330" y="581.0" font-size="9" fill="#3A3A3A" text-anchor="middle">98% gyro + 2% accel</text><polyline points="330,592 330,616" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="200.0" y="616" width="260" height="46" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="633.0" font-size="11" fill="#000000" text-anchor="middle">Write angles to shared memory</text><text x="330" y="650.0" font-size="9" fill="#3A3A3A" text-anchor="middle">imuLock critical section</text><polyline points="330,662 330,686" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="200.0" y="686" width="260" height="44" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="702.0" font-size="11" fill="#000000" text-anchor="middle">Read RC pulse widths</text><text x="330" y="719.0" font-size="9" fill="#3A3A3A" text-anchor="middle">stale &gt;30 ms → 0</text><polyline points="330,730 330,754" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="200.0" y="754" width="260" height="46" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="771.0" font-size="11" fill="#000000" text-anchor="middle">Map to % · deadband · cache</text><text x="330" y="788.0" font-size="9" fill="#3A3A3A" text-anchor="middle">±3% centre → 50 · pwmPct1-4</text><polyline points="330,800 330,846" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><polygon points="330,856.0 405.0,892 330,928.0 255.0,892" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="