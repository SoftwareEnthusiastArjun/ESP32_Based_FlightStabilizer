x="630" y="1083.0" font-size="9" fill="#3A3A3A" text-anchor="middle">bumpless transfer</text><polyline points="630,1096 630,1136 332,1136" fill="none" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/><polyline points="330,1105 330,1150" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="338" y="1146" font-size="9.5" fill="#000000" text-anchor="start">[no]</text><polygon points="330,1161.0 405.0,1196 330,1231.0 255.0,1196" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="1193" font-size="10" fill="#000000" text-anchor="middle">both sticks</text><text x="330" y="1207" font-size="10" fill="#000000" text-anchor="middle">centred ±5%?</text><polyline points="405,1196 560,1196" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="412" y="1190" font-size="9.5" fill="#000000" text-anchor="start">[no]</text><rect x="565.0" y="1166" width="130" height="60" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="630" y="1190.0" font-size="11" fill="#000000" text-anchor="middle">Moved axis manual</text><text x="630" y="1207.0" font-size="9" fill="#3A3A3A" text-anchor="middle">other axis PID</text><polyline points="630,1226 630,1356 332,1356" fill="none" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/><polyline points="330,1231 330,1262" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="338" y="1256" font-size="9.5" fill="#000000" text-anchor="start">[yes]</text><rect x="200.0" y="1262" width="260" height="48" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="330" y="1280.0" font-size="11" fill="#000000" text-anchor="middle">computePID() — pitch &amp; roll</text><text x="330" y="1297.0" font-size="9" fill="#3A3A3A" text-anchor="middle">deadband · integral clamp · d-on-meas</text><polyline points="330,1310 330,1372" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect