<svg xmlns="http://www.w3.org/2000/svg" width="760" height="780" viewBox="0 0 760 780" style="font-family: Arial, Helvetica, sans-serif;"><rect width="760" height="780" fill="#FFFFFF"/><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#4B4B4B"/></marker><marker id="open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#4B4B4B" stroke-width="1.2"/></marker></defs><rect x="6" y="6" width="748" height="768" fill="#FFFFFF" stroke="#808080" stroke-width="1.2"/><path d="M 6 6 L 178.4 6 L 178.4 22 L 169.4 31 L 6 31 Z" fill="#FFFFFF" stroke="#808080" stroke-width="1.2"/><text x="14" y="23" font-size="12" font-weight="bold" fill="#000000">act Firmware Lifecycle</text><circle cx="380" cy="58" r="8" fill="#000000"/><polyline points="380,66 380,88" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="220.0" y="88" width="320" height="60" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="380" y="112.0" font-size="11" fill="#000000" text-anchor="middle">setup()</text><text x="380" y="129.0" font-size="9" fill="#3A3A3A" text-anchor="middle">init · calibrate · warm-up · reference · servos</text><polyline points="380,148 380,176" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><polygon points="380,185.0 455.0,220 380,255.0 305.0,220" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="380" y="217" font-size="10" fill="#000000" text-anchor="middle">WiFi</text><text x="380" y="231" font-size="10" fill="#000000" text-anchor="middle">connected?</text><polyline points="305,220 232,220" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="298" y="214" font-size="9.5" fill="#000000" text-anchor="end">[yes]</text><rect x="41.0" y="194" width="190" height="52" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="136" y="214.0" font-size="11" fill="#000000" text-anchor="middle">Spawn CommTask</text><text x="136" y="231.0" font-size="9" fill="#3A3A3A" text-anchor="middle">pinned to Core 0</text><polyline points="136,246 136,296 378,296" fill="none" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/><polyline points="455,220 528,220" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="462" y="214" font-size="9.5" fill="#000000" text-anchor="start">[no]</text><rect x="531.0" y="194" width="190" height="52" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="626" y="214.0" font-size="11" fill="#000000" text-anchor="middle">Flight-only mode</text><text x="626" y="231.0" font-size="9" fill="#3A3A3A" text-anchor="middle">no Core 0 task</text><polyline points="626,246 626,296 382,296" fill="none" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/><polyline points="380,255 380,312" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="220.0" y="312" width="320" height="46" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="380" y="329.0" font-size="11" fill="#000000" text-anchor="middle">Servo wiggle ×3</text><text x="380" y="346.0" font-size="9" fill="#3A3A3A" text-anchor="middle">setup complete</text><polyline points="380,358 380,392" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="140" y="392" width="480" height="5" fill="#000"/><text x="380" y="386" font-size="9.5" fill="#000000" text-anchor="middle">fork — both cores run in parallel, forever</text><polyline points="230,397 230,428" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><polyline points="530,397 530,428" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><rect x="110.0" y="428" width="240" height="150" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="230" y="507.0" font-size="11" fill="#000000" text-anchor="middle"> </text><text x="230" y="452" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">Core 1 — loop()</text><text x="230" y="474" font-size="9.5" fill="#3A3A3A" text-anchor="middle">every 20 ms:</text><text x="230" y="492" font-size="9.5" fill="#3A3A3A" text-anchor="middle">read sensors → fuse angles</text><text x="230" y="510" font-size="9.5" fill="#3A3A3A" text-anchor="middle">read RC channels</text><text x="230" y="528" font-size="9.5" fill="#3A3A3A" text-anchor="middle">run PID (if autopilot)</text><text x="230" y="546" font-size="9.5" fill="#3A3A3A" text-anchor="middle">write servos</text><rect x="410.0" y="428" width="240" height="150" rx="12" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="530" y="507.0" font-size="11" fill="#000000" text-anchor="middle"> </text><text x="530" y="452" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">Core 0 — CommTask()</text><text x="530" y="474" font-size="9.5" fill="#3A3A3A" text-anchor="middle">wait for GCS client</text><text x="530" y="492" font-size="9.5" fill="#3A3A3A" text-anchor="middle">read + dispatch commands</text><text x="530" y="510" font-size="9.5" fill="#3A3A3A" text-anchor="middle">PWM stream (5 Hz)</text><text x="530" y="528" font-size="9.5" fill="#3A3A3A" text-anchor="middle">IMU stream (50 Hz)</text><text x="530" y="546" font-size="9.5" fill="#3A3A3A" text-anchor="middle">yield to WiFi stack</text><polyline points="350,500 376,500 376,540 350,540" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="384" y="524" font-size="9.5" fill="#000000" text-anchor="start">loop</text><polyline points="650,500 676,500 676,540 650,540" fill="none" stroke="#4B4B4B" stroke-width="1" marker-end="url(#arr)"/><text x="684" y="524" font-size="9.5" fill="#000000" text-anchor="start">loop</text><path d="M 140 630 L 608 630 L 620 642 L 620 696 L 140 696 Z" fill="#FFFFE1" stroke="#808080" stroke-width="0.9"/><path d="M 608 630 L 608 642 L 620 642" fill="none" stroke="#808080" stroke-width="0.9"/><text x="148" y="646" font-size="9" fill="#000000">Core 1 needs no WiFi and no GCS — flight control runs standalone.</text><text x="148" y="659" font-size="9" fill="#000000">A slow network event on Core 0 can never delay a servo update.</text><text x="148" y="672" font-size="9" fill="#000000">Shared data crosses cores only via imuLock and configMutex.</text></svg>