<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" style="font-family: Arial, Helvetica, sans-serif;"><rect width="900" height="760" fill="#FFFFFF"/><rect x="6" y="6" width="888" height="748" fill="#FFFFFF" stroke="#808080" stroke-width="1.2"/><path d="M 6 6 L 156.8 6 L 156.8 22 L 147.8 31 L 6 31 Z" fill="#FFFFFF" stroke="#808080" stroke-width="1.2"/><text x="14" y="23" font-size="12" font-weight="bold" fill="#000000">uc System Use Cases</text><circle cx="90" cy="210" r="9" fill="none" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="219" x2="90" y2="238" stroke="#000000" stroke-width="1.3"/><line x1="78" y1="226" x2="102" y2="226" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="238" x2="80" y2="254" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="238" x2="100" y2="254" stroke="#000000" stroke-width="1.3"/><text x="90" y="270" font-size="10.5" fill="#000000" text-anchor="middle">Engineer / Hobbyist</text><circle cx="90" cy="540" r="9" fill="none" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="549" x2="90" y2="568" stroke="#000000" stroke-width="1.3"/><line x1="78" y1="556" x2="102" y2="556" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="568" x2="80" y2="584" stroke="#000000" stroke-width="1.3"/><line x1="90" y1="568" x2="100" y2="584" stroke="#000000" stroke-width="1.3"/><text x="90" y="600" font-size="10.5" fill="#000000" text-anchor="middle">RC Pilot</text><rect x="220" y="60" width="230" height="180" fill="#FFFFFF" stroke="#808080" stroke-width="1.1"/><text x="335.0" y="78" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">GCSHelper</text><ellipse cx="335" cy="115" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="113" font-size="10" fill="#000000" text-anchor="middle">Flash firmware</text><text x="335" y="127" font-size="10" fill="#000000" text-anchor="middle">(.bin via esptool)</text><ellipse cx="335" cy="185" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="189" font-size="10" fill="#000000" text-anchor="middle">Monitor serial output</text><rect x="220" y="270" width="230" height="420" fill="#FFFFFF" stroke="#808080" stroke-width="1.1"/><text x="335.0" y="288" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">FlightGCS</text><ellipse cx="335" cy="325" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="323" font-size="10" fill="#000000" text-anchor="middle">Connect to aircraft</text><text x="335" y="337" font-size="10" fill="#000000" text-anchor="middle">(auto-discover)</text><ellipse cx="335" cy="380" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="384" font-size="10" fill="#000000" text-anchor="middle">Tune filter coefficients</text><ellipse cx="335" cy="435" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="439" font-size="10" fill="#000000" text-anchor="middle">Tune PID gains</text><ellipse cx="335" cy="490" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="494" font-size="10" fill="#000000" text-anchor="middle">View live HUD</text><ellipse cx="335" cy="545" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="549" font-size="10" fill="#000000" text-anchor="middle">Calibrate gyro</text><ellipse cx="335" cy="620" rx="96" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="335" y="618" font-size="10" fill="#000000" text-anchor="middle">Save settings</text><text x="335" y="632" font-size="10" fill="#000000" text-anchor="middle">to EEPROM</text><rect x="560" y="150" width="300" height="480" fill="#FFFFFF" stroke="#808080" stroke-width="1.1"/><text x="710.0" y="168" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">ESP32 Firmware</text><ellipse cx="710" cy="215" rx="110" ry="26" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="710" y="213" font-size="10" fill="#000000" text-anchor="middle">Stabilize attitude</text><text x="710" y="227" font-size="10" fill="#000000" text-anchor="middle">(autopilot)</text><ellipse cx="710" cy="300" rx="110" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="710" y="298" font-size="10" fill="#000000" text-anchor="middle">Fly manually</text><text x="710" y="312" font-size="10" fill="#000000" text-anchor="middle">(RC pass-through)</text><ellipse cx="710" cy="380" rx="110" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="710" y="378" font-size="10" fill="#000000" text-anchor="middle">Engage autopilot</text><text x="710" y="392" font-size="10" fill="#000000" text-anchor="middle">(CH4 switch)</text><ellipse cx="710" cy="460" rx="110" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="710" y="458" font-size="10" fill="#000000" text-anchor="middle">Stream telemetry</text><text x="710" y="472" font-size="10" fill="#000000" text-anchor="middle">to GCS</text><ellipse cx="710" cy="545" rx="110" ry="24" fill="#FFFFCC" stroke="#808080" stroke-width="1"/><text x="710" y="543" font-size="10" fill="#000000" text-anchor="middle">Persist settings</text><text x="710" y="557" font-size="10" fill="#000000" text-anchor="middle">in EEPROM</text><line x1="106" y1="228" x2="239" y2="118" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="234" x2="239" y2="186" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="325" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="380" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="435" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="490" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="545" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="240" x2="239" y2="620" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="558" x2="600" y2="303" stroke="#4B4B4B" stroke-width="1"/><line x1="106" y1="564" x2="600" y2="384" stroke="#4B4B4B" stroke-width="1"/><line x1="450" y1="480" x2="560" y2="480" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3"/><text x="505" y="470" font-size="9" fill="#000000" text-anchor="middle">WiFi TCP :12345</text><line x1="450" y1="150" x2="560" y2="230" stroke="#4B4B4B" stroke-width="1" stroke-dasharray="5 3"/><text x="505" y="176" font-size="9" fill="#000000" text-anchor="middle">USB serial</text><path d="M 560 650 L 848 650 L 860 662 L 860 704 L 560 704 Z" fill="#FFFFE1" stroke="#808080" stroke-width="0.9"/><path d="M 848 650 L 848 662 L 860 662" fill="none" stroke="#808080" stroke-width="0.9"/><text x="568" y="666" font-size="9" fill="#000000">The RC pilot only interacts through the</text><text x="568" y="679" font-size="9" fill="#000000">4-channel receiver. All configuration is</text><text x="568" y="692" font-size="9" fill="#000000">done by the engineer over WiFi or USB.</text></svg>